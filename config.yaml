llm:
  max_tokens: 16384

paths:
  raw: "./raw"
  wiki: "./wiki"
  outputs: "./wiki/outputs"
  meta: "./wiki/_meta"
  concepts: "./wiki/concepts"

compile:
  batch_size: 5
  backlinks: true

worker:
  enabled: false
  learn_interval_hours: 6
  compile_interval_hours: 1
  taxonomy_interval_hours: 12
  health_check_interval_hours: 24
  learn_batch_size: 5
  learn_source: cbeta

health:
  auto_fix_broken_links: true
  max_stubs_per_run: 10

lint:
  web_search: false

branding:
  name: "KWiki"
  name_short: "K"
  tagline: "工程设计标准知识库"
  powered_by_label: "Powered by LLMBase"
  powered_by_url: "https://github.com/Hosuke/llmbase"

auth:
  enabled: true           # true = 需要登录, false = 不登录模式
  secret_key: "kwiki-session-secret-2026"
  yz_login_url: "http://192.168.0.19:5555"
  callback_url: ""        # 留空自动检测